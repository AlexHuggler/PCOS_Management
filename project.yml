name: PCOS
options:
  bundleIdPrefix: alex
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: 5.43.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: 2PW989LA87
    CODE_SIGN_STYLE: Automatic

targets:
  PCOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    sources:
      - path: PCOS/PCOS
        excludes:
          - "**/.DS_Store"
          - "**/.gitkeep"
          - "**/README.md"
          - "Resources/Assets.xcassets"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: alex.PCOS
        PRODUCT_NAME: PCOS
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: PCOS/PCOS/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: CycleBalance
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "CycleBalance uses your photo library to save and compare hair growth/loss progress photos."
        INFOPLIST_KEY_NSCameraUsageDescription: "CycleBalance uses your camera to capture hair growth/loss progress photos for tracking."
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-Owholemodule"
          SWIFT_COMPILATION_MODE: wholemodule
    entitlements:
      path: PCOS/PCOS.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - "iCloud.com.cyclebalance.app"
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.healthkit: true
    dependencies:
      - package: RevenueCat
        product: RevenueCat

  PCOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PCOS/PCOSTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: alex.PCOSTests
        PRODUCT_NAME: PCOSTests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PCOS.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PCOS"
        BUNDLE_LOADER: "$(TEST_HOST)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - target: PCOS

  PCOSUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PCOS/PCOSUITests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: alex.PCOSUITests
        PRODUCT_NAME: PCOSUITests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: PCOS
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - target: PCOS

schemes:
  PCOS:
    build:
      targets:
        PCOS: all
        PCOSTests: [test]
        PCOSUITests: [test]
    run:
      config: Debug
      environmentVariables:
        PREMIUM_BILLING_MODE_OVERRIDE: local_storekit
    test:
      config: Debug
      gatherCoverageData: false
      environmentVariables:
        PREMIUM_BILLING_MODE_OVERRIDE: local_storekit
      targets:
        - name: PCOSTests
        - name: PCOSUITests
    archive:
      config: Release

  PCOS-LocalStoreKit:
    build:
      targets:
        PCOS: all
        PCOSTests: [test]
        PCOSUITests: [test]
    run:
      config: Debug
      environmentVariables:
        PREMIUM_BILLING_MODE_OVERRIDE: local_storekit
      storeKitConfiguration: PCOS/PCOS/StoreKit/PCOS.storekit
    test:
      config: Debug
      gatherCoverageData: false
      environmentVariables:
        PREMIUM_BILLING_MODE_OVERRIDE: local_storekit
      storeKitConfiguration: PCOS/PCOS/StoreKit/PCOS.storekit
      targets:
        - name: PCOSTests
        - name: PCOSUITests
    archive:
      config: Release
