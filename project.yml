name: CycleBalance
options:
  bundleIdPrefix: com.cyclebalance
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  CycleBalance:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CycleBalance
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_GENERATION_MODE: GeneratedFile
        PRODUCT_BUNDLE_IDENTIFIER: com.cyclebalance.app
        PRODUCT_NAME: CycleBalance
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_CFBundleDisplayName: CycleBalance
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "CycleBalance uses your photo library to save and compare hair growth/loss progress photos."
        INFOPLIST_KEY_NSCameraUsageDescription: "CycleBalance uses your camera to capture hair growth/loss progress photos for tracking."
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-Owholemodule"
          SWIFT_COMPILATION_MODE: wholemodule
    entitlements:
      path: CycleBalance/CycleBalance.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - "iCloud.com.cyclebalance.app"
        com.apple.developer.icloud-services:
          - CloudKit

  CycleBalanceTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: CycleBalanceTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cyclebalance.tests
        PRODUCT_NAME: CycleBalanceTests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CycleBalance.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/CycleBalance"
        BUNDLE_LOADER: "$(TEST_HOST)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - target: CycleBalance
